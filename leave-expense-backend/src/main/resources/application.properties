spring.application.name=leave-expense-backend
server.port=${PORT:8080}

# ===== MySQL Database =====
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/leave_expense_db}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:password}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===== JPA / Hibernate =====
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ===== JWT =====
# IMPORTANT: override this with a long random secret via env var in production
jwt.secret=${JWT_SECRET:ChangeThisToALongRandomSecretKeyForJWTSigningAtLeast256BitsLong}
jwt.expiration.ms=${JWT_EXPIRATION_MS:86400000}

# ===== CORS =====
# Frontend will run on a different origin (e.g. http://localhost:5173 for Vite)
#app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000,https://leave-expense-frontend.vercel.app}

# ===== Logging =====
logging.level.com.leaveexpense=INFO
logging.level.org.springframework.security=INFO